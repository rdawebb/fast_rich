# Optional Rust accelerator for the width engine.
#
# Builds `fastrich._width._width_rs`, which the Python seam
# (src/fastrich/_width/__init__.py) imports in preference to the pure-Python
# reference, falling back automatically when the extension is absent.
#
# PARITY REQUIREMENT: scalar widths come from src/width_table.rs, generated by
# scripts/gen_width_table.py from the UCD alongside the Python _width_table.py,
# so both engines share identical data and policy.

[package]
name = "fastrich-width"
version = "0.1.0"
edition = "2021"

[lib]
name = "_width_rs"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.22", features = ["extension-module", "abi3-py310"] }
unicode-segmentation = "1"
